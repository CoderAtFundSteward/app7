# FundSteward — local Supabase CLI config.
# Run: supabase start | supabase db reset | supabase db push (when linked)
# https://supabase.com/docs/guides/cli/config

project_id = "fundsteward_dataeng"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
